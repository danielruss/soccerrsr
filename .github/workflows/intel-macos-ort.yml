name: Intel macOS dynamic ONNX Runtime

on:
  workflow_dispatch:
  push:
    branches: 
      ort-fallback

jobs:
  r-dynamic-ort:
    runs-on: macos-15-intel

    steps:
      - name: Check out soccerrsr
        uses: actions/checkout@v4
        with:
          path: soccerrsr

      - name: Check out soccer-rs
        uses: actions/checkout@v4
        with:
          repository: danielruss/soccer-rs
          ref: ort-tract-fallback
          path: soccer-rs

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: soccerrsr

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: brew install protobuf

      - name: Download Intel ONNX Runtime
        shell: bash
        run: |
          curl --fail --location \
            --output "$RUNNER_TEMP/onnxruntime.nupkg" \
            https://api.nuget.org/v3-flatcontainer/microsoft.ml.onnxruntime/1.23.2/microsoft.ml.onnxruntime.1.23.2.nupkg
          echo "25fe172f7fcdf34f2b5b02c8b997f6b88abc282956849d4af4335af23d0c4e4a  $RUNNER_TEMP/onnxruntime.nupkg" \
            | shasum -a 256 --check
          mkdir -p "$RUNNER_TEMP/onnxruntime"
          unzip -j "$RUNNER_TEMP/onnxruntime.nupkg" \
            runtimes/osx-x64/native/libonnxruntime.dylib \
            -d "$RUNNER_TEMP/onnxruntime"
          echo "ORT_DYLIB_PATH=$RUNNER_TEMP/onnxruntime/libonnxruntime.dylib" >> "$GITHUB_ENV"

      - name: Install soccerrsr
        working-directory: soccerrsr
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/R-library"
          R CMD INSTALL --library="$RUNNER_TEMP/R-library" .
          echo "R_LIBS_USER=$RUNNER_TEMP/R-library" >> "$GITHUB_ENV"

      - name: Run dynamic ONNX Runtime test from R
        working-directory: soccerrsr
        run: Rscript tests/dynamic-onnx-runtime.R
