name: Compile soccerrsr on multiple platforms
on:
  push:
    branches: 
      - ci-fix
  workflow_dispatch:

jobs:
  make_windows_version:
    runs-on: windows-latest
    steps:
      # check out the code from github
      - name: checkout from github
        uses: actions/checkout@v4

      - name: Install R
        uses: r-lib/actions/setup-r@v2
      
      - run: Rscript -e "sessionInfo()"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
          targets-default: x86_64-pc-windows-gnu

      - name: Set GNU as default Rust target
        run: rustup default stable-x86_64-pc-windows-gnu

      - run: cargo version

      - name: Build Package via R / rextendr
        run: |
          Rscript -e "install.packages(c('devtools', 'rextendr'), repos = 'https://packagemanager.posit.co/cran/latest')"
          Rscript -e "devtools::document()"
          Rscript -e "devtools::build(binary = TRUE)"